  <script>
    const canvas = document.getElementById("particle-canvas");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5; // Partikel sedikit diperkecil
        this.speedY = Math.random() * 0.4 + 0.1;
        this.opacity = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.y -= this.speedY;
        if (this.y < -10) {
          this.y = canvas.height + 10;
          this.x = Math.random() * canvas.width;
        }
      }
      draw() {
        ctx.fillStyle = `rgba(243, 230, 212, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      for (let i = 0; i < 70; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p) => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    init();
    animate();
    function updateVintageClock() {
      const now = new Date();

      // --- 1. PENGATURAN JAM ANALOG ---
      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();

      // Menghitung derajat rotasi (360 derajat)
      const secondsDegrees = (seconds / 60) * 360;
      // Menit bergerak halus sesuai detik
      const minutesDegrees = ((minutes / 60) * 360) + ((seconds / 60) * 6);
      // Jam bergerak halus sesuai menit
      const hoursDegrees = ((hours / 12) * 360) + ((minutes / 60) * 30);

      // Terapkan rotasi ke CSS
      document.getElementById('second-hand').style.transform = `translateX(-50%) rotate(${secondsDegrees}deg)`;
      document.getElementById('minute-hand').style.transform = `translateX(-50%) rotate(${minutesDegrees}deg)`;
      document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hoursDegrees}deg)`;

      // --- 2. PENGATURAN TEKS DIGITAL (Opsional) ---
      let textHours = hours < 10 ? '0' + hours : hours;
      let textMinutes = minutes < 10 ? '0' + minutes : minutes;
      let textSeconds = seconds < 10 ? '0' + seconds : seconds;
      document.getElementById('vintage-time').innerText = textHours + ':' + textMinutes + ':' + textSeconds;
    }

    setInterval(updateVintageClock, 1000);
    updateVintageClock();
  </script>
